# Pre-commit hooks for GoGoGo project
#
# Install: uv run pre-commit install
# Run manually: uv run pre-commit run --all-files

default_language_version:
  python: python3

repos:
  # Python: pyright type check and ruff check/format
  - repo: local
    hooks:
      - id: ruff-check
        name: ruff (check)
        entry: uv run ruff check
        description: Run ruff check on Python files
        language: system
        types_or: [python]
        pass_filenames: true
        always_run: false

      - id: ruff-format
        name: ruff (format)
        entry: uv run ruff format
        description: Run ruff format on Python files
        language: system
        types_or: [python]
        pass_filenames: false
        require_serial: true
        always_run: false

      - id: pyright
        name: pyright (type check)
        entry: bash -c 'cd backend && uv run pyright'
        description: Run pyright type check on Python files
        language: system
        types_or: [python]
        pass_filenames: false
        always_run: false

  # Frontend: ESLint + Prettier (TypeScript/JavaScript)
  - repo: local
    hooks:
      - id: frontend-lint
        name: frontend lint
        entry: bash -c 'cd frontend && npm run lint'
        description: Run ESLint on frontend TypeScript files
        language: system
        files: ^frontend/src/
        types_or: [ts, tsx]
        pass_filenames: true
        always_run: false

      - id: frontend-typecheck
        name: frontend typecheck
        entry: bash -c 'cd frontend && npx tsc --noEmit'
        description: Run TypeScript type check on frontend files
        language: system
        files: ^frontend/src/
        types_or: [ts, tsx]
        pass_filenames: false
        always_run: false

      - id: frontend-format
        name: frontend format
        entry: npx prettier --write
        description: Format frontend files with Prettier
        language: system
        files: ^frontend/src/
        types_or: [ts, tsx]
        pass_filenames: true
        always_run: false

  # Prettier: format all other files (JSON, YAML, MD, etc.)
  - repo: local
    hooks:
      - id: prettier-format
        name: prettier format
        entry: npx prettier --write --ignore-unknown
        description: Format non-Python files with Prettier
        language: system
        pass_filenames: false
        require_serial: true
        always_run: false
