# Pre-commit hooks for GoGoGo project
#
# Install: pre-commit install
# Run manually: pre-commit run --all-files

repos:
  # Python: ruff check and format
  - repo: local
    hooks:
      - id: ruff-check
        name: ruff (check)
        entry: ruff check
        description: 'Run ruff check on Python files'
        language: system
        types_or: [python]
        pass_filenames: true

      - id: ruff-format
        name: ruff (format)
        entry: ruff format
        description: 'Run ruff format on Python files'
        language: system
        types_or: [python]
        pass_filenames: false
        require_serial: true

  # Frontend: ESLint + Prettier (TypeScript/JavaScript)
  - repo: local
    hooks:
      - id: frontend-lint
        name: frontend lint
        entry: bash -c 'cd frontend && npm run lint'
        description: 'Run ESLint on frontend TypeScript files'
        language: system
        files: ^frontend/src/
        types_or: [ts, tsx]
        pass_filenames: false

      - id: frontend-format
        name: frontend format
        entry: bash -c 'cd frontend && npx prettier --write "src/**/*.{ts,tsx}"'
        description: 'Format frontend files with Prettier'
        language: system
        files: ^frontend/src/
        types_or: [ts, tsx]
        pass_filenames: false

  # Prettier: format all other files (JSON, YAML, MD, etc.)
  - repo: local
    hooks:
      - id: prettier-format
        name: prettier format
        entry: npx prettier --write --ignore-unknown
        description: 'Format non-Python files with Prettier'
        language: system
        pass_filenames: false
        require_serial: true
