name: gogogo

services:
  db:
    image: postgres:16
    restart: unless-stopped
    environment:
      POSTGRES_USER: gogogo
      POSTGRES_PASSWORD: gogogo
      POSTGRES_DB: gogogo
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - gogogo-shared
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U gogogo -d gogogo']
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    command: /startup.sh
    environment:
      TZ: Asia/Hong_Kong
      DATABASE_URL: postgresql://gogogo:gogogo@db:5432/gogogo
      SECRET_KEY: ${SECRET_KEY}
      ACCESS_TOKEN_EXPIRE_MINUTES: ${ACCESS_TOKEN_EXPIRE_MINUTES:-43200}
      GEMINI_API_KEY: ${GEMINI_API_KEY}
      GEMINI_MODEL: ${GEMINI_MODEL:-gemini-3-flash-preview}
      GEMINI_LITE_MODEL: ${GEMINI_LITE_MODEL:-gemini-3.1-flash-lite-preview}
      SERPAPI_KEY: ${SERPAPI_KEY}
      TAVILY_API_KEY: ${TAVILY_API_KEY}
      OPENWEATHER_API_KEY: ${OPENWEATHER_API_KEY}
      GOOGLE_MAPS_API_KEY: ${GOOGLE_MAPS_API_KEY}
      LOG_LEVEL: ${LOG_LEVEL:-DEBUG}
      # VPN Proxy settings (optional - only used when LLM_PROXY_ENABLED=true)
      LLM_PROXY_ENABLED: ${LLM_PROXY_ENABLED:-false}
      SOCKS5_PROXY_URL: ${SOCKS5_PROXY_URL:-socks5://vpn-proxy:1080}
    networks:
      - gogogo-shared
    ports:
      - '8000:8000'
    volumes:
      - ./backend:/app
      - ./backend/scripts:/app/scripts
      - ./backend/app/logs:/app/logs
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ['CMD', 'curl', '-f', 'http://localhost:8000/api/v1/health']
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    restart: unless-stopped
    command: npm run dev -- --host
    environment:
      VITE_API_URL: http://localhost:8000/api/v1
    ports:
      - '5173:5173'
    volumes:
      - ./frontend:/app
      - /app/node_modules
    healthcheck:
      test: ['CMD-SHELL', 'curl -s http://localhost:5173/ > /dev/null && echo ok']
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

networks:
  gogogo-shared:
    external: true

volumes:
  postgres_data:
